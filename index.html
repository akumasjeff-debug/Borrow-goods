<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 採購校對 - 診斷版</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .box { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #inputArea { width: 100%; min-height: 200px; border: 1px solid #ccc; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .error-box { color: red; background: #fee; padding: 10px; display: none; margin: 10px 0; border: 1px solid red; }
    </style>
</head>
<body>
<div class="box">
    <h2>🎨 AI 智慧校對 (最後測試)</h2>
    <div id="inputArea" contenteditable="true" placeholder="在此貼入內容..."></div>
    <div id="errorDisplay" class="error-box"></div>
    <button onclick="testAI()">執行辨識</button>
    <div id="res"></div>
</div>

<script>
    const API_KEY = "AIzaSyDak1zCKIkYEZKgysE2DKMhgoll-mkLuYg"; 

    async function testAI() {
        const text = document.getElementById('inputArea').innerText;
        const errDiv = document.getElementById('errorDisplay');
        errDiv.style.display = "none";

        // 使用 v1beta 介面，這是目前對新 Key 支援度最高的路徑
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `提取商品編號(XXXXXX-XXXXXXXXX)與數量，回傳JSON陣列:[{"no":"","qty":0}]。對話：${text}` }] }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(JSON.stringify(data.error));

            alert("✅ 連線成功！AI 已回應。");
            console.log(data);
            document.getElementById('res').innerText = data.candidates[0].content.parts[0].text;

        } catch (e) {
            errDiv.style.display = "block";
            errDiv.innerText = "失敗原因：" + e.message;
        }
    }
</script>
</body>
</html>
