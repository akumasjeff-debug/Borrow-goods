<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>API 終極體檢 - 模型探測器</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e293b; color: #f8fafc; padding: 20px; line-height: 1.6; }
        .box { max-width: 800px; margin: auto; background: #0f172a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        button { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2563eb; }
        pre { background: #000; padding: 20px; border-radius: 8px; overflow-x: auto; color: #10b981; font-size: 15px; border: 1px solid #334155; min-height: 200px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #60a5fa; text-align: center;">🕵️ Google API 終極體檢：尋找你的專屬模型</h2>
        <p style="text-align: center; color: #94a3b8;">既然 Google 說找不到模型，我們就直接調閱它的後台清單。</p>
        <button onclick="checkModels()">🔍 點擊探測可用模型清單</button>
        <pre id="output">等待探測中...</pre>
    </div>

    <script>
        const API_KEY = "AIzaSyBh4RqEvV0OVWrivEMj-g-xP5JQZVPu2qk";
        
        async function checkModels() {
            const out = document.getElementById('output');
            out.innerText = "🚀 正在向 Google 總機查詢您的權限清單，請稍候...";
            
            try {
                // 這是 Google 官方提供的「查詢可用模型」專用網址
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await res.json();
                
                if(!res.ok) throw new Error(JSON.stringify(data, null, 2));
                
                let resultText = "✅ 查詢成功！您的這把 Key 支援以下模型 (有打 🟢 的代表可以跑文字對話)：\n\n";
                let hasValidModel = false;

                if(data.models && data.models.length > 0) {
                    data.models.forEach(m => {
                        // 檢查該模型是否支援 generateContent (我們需要的文字生成功能)
                        if(m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")) {
                            resultText += `🟢 ${m.name}\n`;
                            hasValidModel = true;
                        } else {
                            resultText += `⚪ ${m.name} (不支援純文字生成)\n`;
                        }
                    });
                } 

                if (!hasValidModel) {
                    resultText += "\n❌ 慘了，這把 Key 裡面沒有綁定任何可以對話的模型！這表示您的 Google 帳號/地區可能被限制了。";
                }

                out.innerText = resultText;

            } catch (e) {
                out.innerText = `❌ 查詢失敗：\n${e.message}`;
            }
        }
    </script>
</body>
</html>
