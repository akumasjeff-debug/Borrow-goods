<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 採購校對 - 官方 SDK 版</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { color: #2563eb; text-align: center; margin-bottom: 25px; }
        #inputArea { width: 100%; min-height: 250px; padding: 20px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; outline: none; white-space: pre-wrap; background: #fff; box-sizing: border-box; line-height: 1.8; }
        .btn-group { display: flex; gap: 15px; margin: 25px 0; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; color: white; transition: 0.2s; }
        .btn-ai { background: #2563eb; }
        .btn-excel { background: #10b981; }
        #debugLog { background: #fff1f2; border: 1px solid #fda4af; color: #be123c; padding: 15px; border-radius: 10px; font-size: 13px; display: none; margin-bottom: 20px; word-break: break-all; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: bold; }
        mark { border-radius: 6px; padding: 2px 6px; color: #000; font-weight: bold; }
        #loading { text-align: center; color: #2563eb; font-weight: bold; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 採購資料 AI 智慧校對 (官方 SDK 救命版)</h1>
    <div id="inputArea" contenteditable="true" placeholder="在此貼入對話內容..."></div>
    <div class="btn-group">
        <button id="runBtn" class="btn-ai">1. 執行 AI 智慧辨識</button>
        <button id="exBtn" class="btn-excel" disabled>2. 匯出 Excel</button>
    </div>
    <div id="loading">🚀 官方 SDK 正在連線中，請稍候...</div>
    <div id="debugLog"></div>
    <table id="resTable">
        <thead>
            <tr><th>商品編號 (補齊後)</th><th>數量</th><th>對話原文</th></tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // 使用您剛產生的新 Key
    const API_KEY = "AIzaSyBh4RqEvV0OVWrivEMj-g-xP5JQZVPu2qk";

    let finalData = [];
    const colorPalette = ["#FFD1DC", "#D1EAFF", "#D1FFD7", "#FFF4D1", "#EAD1FF"];

    document.getElementById('runBtn').addEventListener('click', async () => {
        const text = document.getElementById('inputArea').innerText;
        if (!text.trim()) return alert("請輸入內容");

        const btn = document.getElementById('runBtn');
        const load = document.getElementById('loading');
        const debug = document.getElementById('debugLog');
        
        btn.disabled = true;
        load.style.display = 'block';
        debug.style.display = 'none';

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            // 這裡不再指定 v1 或 v1beta，交給 SDK 自己處理
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = `任務：提取對話中的商品編號(XXXXXX-XXXXXXXXX)與正確數量。理解「改為」等語法。回傳純JSON格式：[{"no":"","qty":0,"txt":""}]。內容：${text}`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const aiRaw = response.text().replace(/```json|```/g, '').trim();
            
            const results = JSON.parse(aiRaw);

            finalData = results.map((item, i) => {
                let sku = item.no.trim();
                if (sku.includes('-') && sku.split('-').length === 2) sku += "-000";
                return { sku, qty: item.qty, txt: item.txt, color: colorPalette[i % colorPalette.length] };
            });

            renderTable(text);
            document.getElementById('exBtn').disabled = false;

        } catch (e) {
            console.error("SDK Error:", e);
            debug.innerHTML = `❌ 錯誤詳情：${e.message}`;
            debug.style.display = 'block';
        } finally {
            load.style.display = 'none';
            btn.disabled = false;
        }
    });

    function renderTable(raw) {
        const tbody = document.getElementById('resBody');
        const area = document.getElementById('inputArea');
        tbody.innerHTML = "";
        let html = raw;

        finalData.forEach(item => {
            tbody.innerHTML += `<tr style="background:${item.color}"><td><b>${item.sku}</b></td><td>${item.qty}</td><td>${item.txt}</td></tr>`;
            if (item.txt) {
                const reg = new RegExp(`(${item.txt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "g");
                html = html.replace(reg, `<mark style="background:${item.color}">$1</mark>`);
            }
        });
        area.innerHTML = html;
    }

    // 匯出功能
    window.exportExcel = function() {
        const ws = XLSX.utils.json_to_sheet(finalData.map(d => ({"商品編號": d.sku, "數量": d.qty})));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
        XLSX.writeFile(wb, "採購智慧校對.xlsx");
    };
    document.getElementById('exBtn').onclick = window.exportExcel;
</script>
</body>
</html>
