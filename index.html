<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 採購資料智慧校對</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { color: #2563eb; text-align: center; margin-bottom: 25px; }
        #inputArea { 
            width: 100%; min-height: 250px; padding: 20px; border: 2px solid #cbd5e1; 
            border-radius: 12px; font-size: 16px; outline: none; background: #fff; 
            box-sizing: border-box; white-space: pre-wrap; line-height: 1.8;
        }
        #inputArea:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-group { display: flex; gap: 15px; margin: 25px 0; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; color: white; transition: 0.2s; }
        .btn-ai { background: #2563eb; }
        .btn-excel { background: #10b981; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: bold; }
        mark { border-radius: 6px; padding: 2px 6px; color: #000; font-weight: bold; }
        #loading { text-align: center; color: #3b82f6; font-weight: bold; display: none; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 採購資料 AI 智慧校對</h1>
    <div id="inputArea" contenteditable="true" placeholder="在此貼入對話內容..."></div>
    
    <div class="btn-group">
        <button id="runBtn" class="btn-ai" onclick="runAI()">1. 執行 AI 智慧辨識</button>
        <button id="xlsBtn" class="btn-excel" onclick="exportExcel()" disabled>2. 匯出 Excel</button>
    </div>

    <div id="loading">🚀 AI 正在辨識語意並補齊編號，請稍候...</div>

    <table id="resTable">
        <thead>
            <tr>
                <th>商品編號 (補齊後)</th>
                <th>數量</th>
                <th>對話原文參考</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script>
    // 💡 您的 API Key 已經確認有效，不需改動
    const API_KEY = "AIzaSyDak1zCKIkYEZKgysE2DKMhgoll-mkLuYg";

    let finalData = [];
    const colorPalette = ["#FFD1DC", "#D1EAFF", "#D1FFD7", "#FFF4D1", "#EAD1FF"];

    async function runAI() {
        const text = document.getElementById('inputArea').innerText;
        if (!text.trim()) return alert("請輸入內容");

        const btn = document.getElementById('runBtn');
        const load = document.getElementById('loading');
        btn.disabled = true;
        load.style.display = 'block';

        // 核心修正：移除無效參數，回歸標準連線
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `任務：提取對話中的商品編號(格式XXXXXX-XXXXXXXXX)與正確數量。
                            判斷規則：請理解「改為」、「原本要...現在變...」等語法。
                            輸出格式：請嚴格回傳純 JSON 陣列，不包含解釋：[{"no":"編號","qty":數字,"txt":"原始文字"}]
                            對話：${text}`
                        }]
                    }]
                })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error ? result.error.message : "連線失敗");
            }

            const aiText = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(aiText);

            finalData = parsed.map((item, i) => {
                let sku = item.no.trim();
                // 自動補齊 -000
                if (sku.includes('-') && sku.split('-').length === 2) sku += "-000";
                return { sku, qty: item.qty, txt: item.txt, color: colorPalette[i % colorPalette.length] };
            });

            render(text);
            document.getElementById('xlsBtn').disabled = false;
        } catch (e) {
            console.error(e);
            alert("辨識發生問題：" + e.message);
        } finally {
            load.style.display = 'none';
            btn.disabled = false;
        }
    }

    function render(raw) {
        const body = document.getElementById('resBody');
        const area = document.getElementById('inputArea');
        body.innerHTML = "";
        let newHtml = raw;

        finalData.forEach(item => {
            body.innerHTML += `<tr style="background:${item.color}"><td><b>${item.sku}</b></td><td>${item.qty}</td><td style="font-size:12px;color:#666">${item.txt}</td></tr>`;
            if (item.txt) {
                const escaped = item.txt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                newHtml = newHtml.replace(new RegExp(`(${escaped})`, "g"), `<mark style="background:${item.color}">$1</mark>`);
            }
        });
        area.innerHTML = newHtml;
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(finalData.map(d => ({"商品編號": d.sku, "數量": d.qty})));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
        XLSX.writeFile(wb, "採購智慧校對.xlsx");
    }
</script>
</body>
</html>
