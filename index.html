<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 採購校對系統 - 終極抗塞車版</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { color: #2563eb; text-align: center; margin-bottom: 20px; }
        
        .key-box { background: #eff6ff; padding: 15px; border-radius: 12px; border: 1px solid #bfdbfe; margin-bottom: 25px; display: flex; gap: 10px; align-items: center; }
        .key-box input { flex: 1; padding: 10px; border: 1px solid #93c5fd; border-radius: 8px; font-family: monospace; outline: none; }
        .key-box button { background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        
        #inputArea { width: 100%; min-height: 200px; padding: 20px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; outline: none; white-space: pre-wrap; background: #fff; box-sizing: border-box; line-height: 1.8; }
        .btn-group { display: flex; gap: 15px; margin: 25px 0; }
        .btn-main { flex: 1; padding: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; color: white; transition: 0.2s; }
        .btn-ai { background: #2563eb; }
        .btn-excel { background: #10b981; }
        .btn-main:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #modelBadge { background: #dcfce7; color: #166534; padding: 10px 15px; border-radius: 8px; font-size: 14px; font-weight: bold; display: none; margin-bottom: 15px; border: 1px solid #bbf7d0; text-align: center; }
        #debugLog { background: #fff1f2; border: 1px solid #fda4af; color: #be123c; padding: 15px; border-radius: 10px; font-size: 13px; display: none; margin-bottom: 20px; word-break: break-all; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: bold; }
        mark { border-radius: 6px; padding: 2px 6px; color: #000; font-weight: bold; }
        #loading { text-align: center; color: #2563eb; font-weight: bold; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 採購資料 AI 智慧校對</h1>
    
    <div class="key-box">
        <label><b>設定 API Key：</b></label>
        <input type="password" id="apiKeyInput" placeholder="請貼上您的 Google Gemini API Key">
        <button onclick="saveKey()">💾 儲存金鑰</button>
    </div>

    <div id="inputArea" contenteditable="true" placeholder="在此貼入對話內容..."></div>
    
    <div class="btn-group">
        <button id="runBtn" class="btn-main btn-ai" onclick="startAI()">1. 執行 AI 智慧辨識</button>
        <button id="exBtn" class="btn-main btn-excel" onclick="exportExcel()" disabled>2. 匯出 Excel</button>
    </div>
    
    <div id="loading">🚀 準備就緒...</div>
    <div id="modelBadge"></div>
    <div id="debugLog"></div>
    
    <table id="resTable">
        <thead>
            <tr><th>商品編號 (補齊後)</th><th>數量</th><th>對話原文參考</th></tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script>
    let finalData = [];
    const colorPalette = ["#FFD1DC", "#D1EAFF", "#D1FFD7", "#FFF4D1", "#EAD1FF"];

    window.onload = function() {
        const savedKey = localStorage.getItem("gemini_api_key");
        if (savedKey) document.getElementById("apiKeyInput").value = savedKey;
    };

    function saveKey() {
        const key = document.getElementById("apiKeyInput").value.trim();
        if (!key) return alert("請先輸入金鑰！");
        localStorage.setItem("gemini_api_key", key);
        alert("✅ 金鑰已安全儲存！");
    }

    async function startAI() {
        const apiKey = document.getElementById("apiKeyInput").value.trim();
        if (!apiKey) return alert("❌ 找不到 API Key！請先貼上並儲存。");

        const text = document.getElementById('inputArea').innerText;
        if (!text.trim()) return alert("請輸入對話內容");

        const btn = document.getElementById('runBtn');
        const load = document.getElementById('loading');
        const debug = document.getElementById('debugLog');
        const badge = document.getElementById('modelBadge');
        
        btn.disabled = true;
        debug.style.display = 'none';
        badge.style.display = 'none';
        
        try {
            // 1. 雷達掃描可用模型
            load.style.display = 'block';
            load.innerText = "🔍 正在向 Google 查詢可用模型清單...";
            
            const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const modelData = await modelRes.json();
            
            if (!modelRes.ok) throw new Error(`查詢模型失敗: ${modelData.error?.message || JSON.stringify(modelData)}`);
            
            // 找出所有可以生成文字的模型
            const availableModels = modelData.models
                .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"))
                .map(m => m.name);
            
            if (availableModels.length === 0) throw new Error("您的金鑰沒有分配到任何可用的對話模型。");

            // 優先嘗試 flash 模型，速度較快
            availableModels.sort((a, b) => {
                if (a.includes("flash") && !b.includes("flash")) return -1;
                if (!a.includes("flash") && b.includes("flash")) return 1;
                return 0;
            });

            let success = false;
            let lastError = "";

            // 2. 自動切換車道 (如果塞車，就換下一個模型)
            for (let targetModel of availableModels) {
                if (success) break;
                
                try {
                    badge.innerHTML = `⏳ 正在嘗試使用模型：<b>${targetModel}</b>...`;
                    badge.style.display = 'block';
                    load.innerText = `🚀 正在發送資料給 ${targetModel}...`;
                    
                    const url = `https://generativelanguage.googleapis.com/v1beta/${targetModel}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `任務：提取對話中的商品編號(包含*與x後面的數量)。理解「改為」等語意。如果沒有提到數量，預設為1。回傳純JSON陣列：[{"no":"商品編號","qty":數量,"txt":"原文參考"}]。不要有任何說明文字。對話內容：${text}`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    // 如果這個模型塞車(503)或失敗，丟出錯誤讓 catch 捕捉並進入下一個迴圈
                    if (!response.ok) throw new Error(data.error ? data.error.message : JSON.stringify(data));

                    // 解析成功資料
                    const aiRaw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                    const results = JSON.parse(aiRaw);

                    finalData = results.map((item, i) => {
                        let sku = item.no.trim();
                        // 處理補齊 -000 邏輯
                        if (sku.includes('-') && sku.split('-').length === 2 && !sku.includes('*')) {
                            sku += "-000";
                        }
                        return { sku, qty: item.qty || 1, txt: item.txt || "", color: colorPalette[i % colorPalette.length] };
                    });

                    renderTable(text);
                    document.getElementById('exBtn').disabled = false;
                    success = true;
                    
                    badge.innerHTML = `✅ 成功選用模型：<b>${targetModel}</b>`;
                    badge.style.background = "#dcfce7";
                    badge.style.color = "#166534";

                } catch (err) {
                    console.warn(`模型 ${targetModel} 失敗:`, err.message);
                    lastError = err.message;
                    badge.innerHTML = `⚠️ 模型 ${targetModel} 忙碌中，切換備用模型...`;
                    badge.style.background = "#fef08a";
                    badge.style.color = "#854d0e";
                }
            }

            if (!success) {
                throw new Error(lastError);
            }

        } catch (e) {
            debug.innerHTML = `<b>❌ 最終報錯詳情：</b><br>${e.message}<br><br>💡 如果顯示 high demand (需求過高)，請等待幾秒鐘後再次點擊按鈕。`;
            debug.style.display = 'block';
            console.error(e);
        } finally {
            load.style.display = 'none';
            btn.disabled = false;
        }
    }

    function renderTable(raw) {
        const tbody = document.getElementById('resBody');
        const area = document.getElementById('inputArea');
        tbody.innerHTML = "";
        let html = raw;

        finalData.forEach(item => {
            tbody.innerHTML += `<tr style="background:${item.color}"><td><b>${item.sku}</b></td><td>${item.qty}</td><td style="font-size:12px;color:#666">${item.txt}</td></tr>`;
            if (item.txt) {
                const reg = new RegExp(`(${item.txt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "g");
                html = html.replace(reg, `<mark style="background:${item.color}">$1</mark>`);
            }
        });
        area.innerHTML = html;
    }

    // 💡 修正匯出 Excel，確保有第三個欄位
    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(finalData.map(d => ({
            "商品編號": d.sku, 
            "數量": d.qty,
            "對話原文參考": d.txt
        })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "採購校對結果");
        XLSX.writeFile(wb, "採購單_AI校對匯出.xlsx");
    }
</script>
</body>
</html>
